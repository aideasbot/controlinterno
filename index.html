<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Control de Gastos</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:        #f5f5f7;
  --white:     #ffffff;
  --border:    #e8e8ed;
  --text:      #1d1d1f;
  --muted:     #86868b;
  --green:     #1a9e5c;
  --green-bg:  #f0faf5;
  --green-pill:#d1f4e4;
  --red:       #d93025;
  --red-bg:    #fdf3f2;
  --red-pill:  #fad7d5;
  --blue:      #0071e3;
  --shadow-s:  0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-m:  0 4px 16px rgba(0,0,0,0.07);
  --r:         16px;
  --r-sm:      10px;
}

body {
  font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 64px;
}

/* ── TOP BAR ── */
.topbar {
  background: rgba(245,245,247,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 50;
  border-bottom: 1px solid var(--border);
  padding: 14px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topbar-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.topbar-date {
  font-size: 12px;
  color: var(--muted);
  font-weight: 400;
}

/* ── LAYOUT ── */
.page {
  max-width: 520px;
  margin: 0 auto;
  padding: 20px 16px 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── TARJETAS DE TOTALES ── */
.totales {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.tot-card {
  background: var(--white);
  border-radius: var(--r);
  padding: 16px;
  box-shadow: var(--shadow-s);
  border: 1px solid var(--border);
}
.tot-card.wide {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
}
.tot-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}
.tot-card.wide .tot-label { margin-bottom: 0; }
.tot-value {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
}
.tot-value.ing { color: var(--green); }
.tot-value.egr { color: var(--red); }
.tot-value.pos { color: var(--green); }
.tot-value.neg { color: var(--red); }
.balance-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 20px;
}
.balance-badge.pos { background: var(--green-pill); color: var(--green); }
.balance-badge.neg { background: var(--red-pill);   color: var(--red); }

/* ── CARD GENÉRICA ── */
.card {
  background: var(--white);
  border-radius: var(--r);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-s);
  overflow: hidden;
}

/* ── TOGGLE TIPO ── */
.toggle-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}
.toggle-btn {
  padding: 14px 10px;
  border: none;
  background: var(--bg);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: -0.01em;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.toggle-btn:first-child { border-right: 1px solid var(--border); }
.toggle-btn.active-ingreso {
  background: var(--green-bg);
  color: var(--green);
  border-bottom-color: var(--green-bg);
}
.toggle-btn.active-egreso {
  background: var(--red-bg);
  color: var(--red);
  border-bottom-color: var(--red-bg);
}

/* ── FORM FIELDS ── */
.fields { padding: 6px 16px 16px; display: flex; flex-direction: column; gap: 2px; }

.field {
  display: flex;
  flex-direction: column;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.field:last-of-type { border-bottom: none; }

.field label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 3px;
}
.field input,
.field select {
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 16px;
  font-weight: 500;
  padding: 2px 0;
  outline: none;
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
}
.field input::placeholder { color: #c0c0c5; font-weight: 400; }
.field input[readonly] { color: var(--muted); font-weight: 400; }
.field input[type="number"] { -moz-appearance: textfield; }
.field input[type="number"]::-webkit-inner-spin-button { display: none; }

.field.monto input {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.03em;
}

/* Select */
.sel-wrap { position: relative; }
.sel-wrap select { padding-right: 20px; }
.sel-wrap::after {
  content: '⌄';
  position: absolute; right: 0; top: 50%;
  transform: translateY(-52%);
  color: var(--muted); font-size: 16px;
  pointer-events: none;
}

/* Autocomplete */
.ac-wrap { position: relative; }
.ac-list {
  position: absolute; top: calc(100% + 8px); left: -16px; right: -16px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  box-shadow: var(--shadow-m);
  z-index: 200;
  max-height: 200px;
  overflow-y: auto;
  display: none;
}
.ac-list.open { display: block; }
.ac-item {
  padding: 12px 16px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.1s;
  border-bottom: 1px solid var(--border);
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover { background: var(--bg); }

/* ── BOTÓN GUARDAR ── */
.btn-save {
  display: block;
  width: calc(100% - 32px);
  margin: 0 16px 16px;
  padding: 15px;
  border: none;
  border-radius: var(--r-sm);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.01em;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-save.ingreso { background: var(--green); color: white; }
.btn-save.egreso  { background: var(--red);   color: white; }
.btn-save:active  { opacity: 0.85; transform: scale(0.99); }
.btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── SECCIÓN MOVIMIENTOS ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 4px 0;
}
.section-header h2 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.section-header span {
  font-size: 12px;
  color: var(--muted);
}

/* Buscador */
.search-wrap {
  position: relative;
}
.search-wrap svg {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}
.search-input {
  width: 100%;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 12px 10px 36px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: #aaa; }
.search-input::placeholder { color: #c0c0c5; }

/* Filtro de meses */
.month-scroll {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: none;
}
.month-scroll::-webkit-scrollbar { display: none; }
.month-btn {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--white);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.month-btn:hover { border-color: #aaa; color: var(--text); }
.month-btn.active {
  background: var(--text);
  border-color: var(--text);
  color: white;
}

.mov-list { display: flex; flex-direction: column; gap: 1px; }

.mov-item {
  background: var(--white);
  padding: 13px 12px 13px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  animation: fadeUp 0.22s ease;
  border-radius: 0;
  border-bottom: 1px solid var(--border);
}
.mov-item:first-child { border-radius: var(--r) var(--r) 0 0; }
.mov-item:last-child  { border-radius: 0 0 var(--r) var(--r); border-bottom: none; }
.mov-item:only-child  { border-radius: var(--r); border-bottom: none; }
@keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

.mov-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
.mov-cat {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.mov-meta {
  font-size: 12px;
  color: var(--muted);
}
.mov-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.mov-amount {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.mov-amount.ingreso { color: var(--green); }
.mov-amount.egreso  { color: var(--red); }
.mov-pill {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
  letter-spacing: 0.02em;
}
.mov-pill.ingreso { background: var(--green-pill); color: var(--green); }
.mov-pill.egreso  { background: var(--red-pill);   color: var(--red); }

.mov-delete {
  background: none;
  border: none;
  padding: 8px;
  cursor: pointer;
  color: #d0d0d5;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.mov-delete:hover { color: var(--red); background: var(--red-bg); }

/* Punto que titila durante el borrado */
.pulse-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  animation: pulse 0.9s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.3; transform: scale(0.6); }
}

.empty {
  text-align: center;
  padding: 32px 20px;
  font-size: 14px;
  color: var(--muted);
}
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1d1d1f;
  color: white;
  padding: 11px 20px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  z-index: 999;
  transition: transform 0.28s cubic-bezier(0.34,1.4,0.64,1);
  box-shadow: var(--shadow-m);
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* Spinner */
.spin {
  display: inline-block; width:15px; height:15px;
  border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
  border-radius: 50%; animation: rot 0.65s linear infinite; vertical-align: middle;
}
@keyframes rot { to { transform: rotate(360deg); } }

@media (min-width: 520px) {
  .topbar { padding: 16px 24px 14px; }
  .page   { padding: 24px 20px 0; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-title">Gastos</div>
  <div class="topbar-date" id="header-date"></div>
</div>

<div class="page">

  <!-- TOTALES -->
  <div class="totales">
    <div class="tot-card">
      <div class="tot-label">Ingresos</div>
      <div class="tot-value ing" id="tot-ing">—</div>
    </div>
    <div class="tot-card">
      <div class="tot-label">Egresos</div>
      <div class="tot-value egr" id="tot-egr">—</div>
    </div>
    <div class="tot-card wide">
      <div class="tot-label">Balance neto</div>
      <div class="balance-badge pos" id="tot-bal">—</div>
    </div>
  </div>

  <!-- FORMULARIO -->
  <div class="card">
    <div class="toggle-wrap">
      <button class="toggle-btn active-ingreso" id="btn-ing" onclick="setTipo('ingreso')">
        ↑ Ingreso
      </button>
      <button class="toggle-btn" id="btn-egr" onclick="setTipo('egreso')">
        ↓ Egreso
      </button>
    </div>

    <div class="fields">
      <div class="field monto">
        <label>Monto</label>
        <input type="number" id="monto" placeholder="0.00" inputmode="decimal"/>
      </div>

      <div class="field">
        <label>Categoría</label>
        <div class="ac-wrap">
          <input type="text" id="categoria" placeholder="Ej: Servicios, Alquiler…"
                 autocomplete="off"
                 oninput="filterCat()"
                 onfocus="filterCat()"
                 onblur="setTimeout(hideAc,200)"/>
          <div class="ac-list" id="ac-list"></div>
        </div>
      </div>

      <div class="field">
        <label>Subcategoría <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#b0b0b5;font-size:10px;">opcional</span></label>
        <div class="ac-wrap">
          <input type="text" id="subcategoria" placeholder="Ej: Hosting, Electricidad…"
                 autocomplete="off"
                 oninput="filterSubcat()"
                 onfocus="filterSubcat()"
                 onblur="setTimeout(hideSubAc,200)"/>
          <div class="ac-list" id="subcat-list"></div>
        </div>
      </div>

      <div class="field">
        <label>Desde</label>
        <div class="ac-wrap">
          <input type="text" id="entidad" placeholder="Seleccioná o escribí uno nuevo…"
                 autocomplete="off"
                 oninput="filterEntidad()"
                 onfocus="filterEntidad()"
                 onblur="setTimeout(hideEntAc,200)"/>
          <div class="ac-list" id="ent-list"></div>
        </div>
      </div>

      <div class="field">
        <label>Fecha</label>
        <input type="text" id="fecha" readonly/>
      </div>
    </div>

    <button class="btn-save ingreso" id="btn-save" onclick="guardar()">
      Registrar ingreso
    </button>
  </div>

  <!-- MOVIMIENTOS -->
  <div class="section-header">
    <h2>Movimientos</h2>
    <span id="mov-count"></span>
  </div>

  <!-- Buscador -->
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-input" id="search-input" type="text"
           placeholder="Buscar por categoría, entidad…"
           oninput="applyFilters()"/>
  </div>

  <!-- Filtro meses -->
  <div style="display:flex;gap:8px;align-items:center;">
    <div class="sel-wrap" style="flex:1;">
      <select id="mes-select" onchange="setMes(this.value)" style="background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 32px 10px 14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text);outline:none;width:100%;-webkit-appearance:none;appearance:none;">
        <option value="todos">Todos los meses</option>
      </select>
    </div>
  </div>

  <div class="card mov-list" id="mov-list">
    <div class="empty">Cargando…</div>
  </div>

</div><!-- /page -->

<div id="toast"></div>
